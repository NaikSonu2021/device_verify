<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Device</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 8px;
        }
        p {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: var(--tg-theme-button-color, #6c63ff);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status {
            font-size: 14px;
            opacity: 0.8;
        }
        .success { color: #4caf50; }
        .error { color: #f44336; }
        .retry-btn {
            margin-top: 16px;
            padding: 10px 24px;
            background: var(--tg-theme-button-color, #6c63ff);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon" id="icon">🔐</div>
        <h1 id="title">Device Verification</h1>
        <p id="desc">Aapka device verify ho raha hai. Please wait...</p>
        <div class="spinner" id="spinner"></div>
        <div class="status" id="status">Collecting device info...</div>
        <button class="retry-btn" id="retryBtn" onclick="verify()">🔄 Retry</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Simple hash function - works on ALL devices (no crypto.subtle needed)
        function simpleHash(str) {
            let hash1 = 5381;
            let hash2 = 52711;
            for (let i = 0; i < str.length; i++) {
                const ch = str.charCodeAt(i);
                hash1 = ((hash1 << 5) + hash1 + ch) >>> 0;
                hash2 = ((hash2 << 5) + hash2 + ch) >>> 0;
            }
            // Combine into a long hex string
            const p1 = hash1.toString(16).padStart(8, '0');
            const p2 = hash2.toString(16).padStart(8, '0');
            // Do multiple rounds for longer hash
            let result = p1 + p2;
            for (let round = 0; round < 3; round++) {
                let h = 0;
                for (let i = 0; i < (str.length + round); i++) {
                    const ch = str.charCodeAt(i % str.length) + round;
                    h = ((h << 7) - h + ch) >>> 0;
                }
                result += h.toString(16).padStart(8, '0');
            }
            return result;
        }

        function getFingerprint() {
            try {
                // Canvas fingerprint
                let canvasHash = 'no-canvas';
                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = 200;
                    canvas.height = 50;
                    const ctx = canvas.getContext('2d');
                    if (ctx) {
                        ctx.textBaseline = 'top';
                        ctx.font = '14px Arial';
                        ctx.fillStyle = '#f60';
                        ctx.fillRect(10, 1, 62, 20);
                        ctx.fillStyle = '#069';
                        ctx.fillText('device-fp-check!@#$', 2, 15);
                        ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
                        ctx.fillText('device-fp-check!@#$', 4, 17);
                        canvasHash = canvas.toDataURL().slice(-80);
                    }
                } catch(e) {
                    canvasHash = 'canvas-error';
                }

                // WebGL fingerprint
                let renderer = 'no-webgl';
                let vendor = 'no-webgl';
                try {
                    const gl = document.createElement('canvas').getContext('webgl');
                    if (gl) {
                        const dbg = gl.getExtension('WEBGL_debug_renderer_info');
                        if (dbg) {
                            renderer = gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) || 'unknown';
                            vendor = gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL) || 'unknown';
                        }
                    }
                } catch(e) {
                    renderer = 'webgl-error';
                }

                const signals = [
                    screen.width,
                    screen.height,
                    screen.colorDepth,
                    screen.availWidth,
                    screen.availHeight,
                    Intl.DateTimeFormat().resolvedOptions().timeZone || 'unknown',
                    navigator.language || 'unknown',
                    (navigator.languages || []).join(','),
                    navigator.platform || 'unknown',
                    navigator.hardwareConcurrency || 0,
                    navigator.deviceMemory || 0,
                    navigator.maxTouchPoints || 0,
                    renderer,
                    vendor,
                    canvasHash,
                    navigator.vendor || 'unknown',
                    window.devicePixelRatio || 1,
                    navigator.userAgent || 'unknown',
                    new Date().getTimezoneOffset(),
                ].join('|||');

                return simpleHash(signals);
            } catch (e) {
                // Ultimate fallback
                const basic = [
                    screen.width, screen.height,
                    navigator.language, navigator.platform,
                    navigator.hardwareConcurrency || 0,
                    navigator.userAgent || 'unknown',
                ].join('|||');
                return simpleHash(basic);
            }
        }

        function verify() {
            try {
                document.getElementById('icon').textContent = '🔐';
                document.getElementById('spinner').style.display = 'block';
                document.getElementById('retryBtn').style.display = 'none';
                document.getElementById('status').className = 'status';
                document.getElementById('status').textContent = 'Generating fingerprint...';

                const fp = getFingerprint();

                if (!fp) {
                    throw new Error('Fingerprint generation failed');
                }

                document.getElementById('status').textContent = 'Sending to bot...';

                tg.sendData(JSON.stringify({
                    action: 'device_verify',
                    fingerprint: fp,
                    timestamp: Date.now()
                }));

                document.getElementById('icon').textContent = '✅';
                document.getElementById('title').textContent = 'Verified!';
                document.getElementById('desc').textContent = 'Device verified successfully. You can close this.';
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('status').className = 'status success';
                document.getElementById('status').textContent = 'Verification complete!';

                setTimeout(() => tg.close(), 1500);

            } catch (e) {
                document.getElementById('icon').textContent = '❌';
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('status').className = 'status error';
                document.getElementById('status').textContent = 'Error: ' + (e.message || 'Unknown error');
                document.getElementById('retryBtn').style.display = 'inline-block';
            }
        }

        setTimeout(verify, 500);
    </script>
</body>
</html>
